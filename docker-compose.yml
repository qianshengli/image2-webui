services:
  studio:
    image: ${IMAGE_REPO:-docker.io/qq1090188816/image2-webui}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${BUILD_VERSION:-dev}
        COMMIT: ${IMAGE_COMMIT:-local}
        BUILD_TIME: ${IMAGE_BUILD_TIME:-local}
    ports:
      - "7000:7000"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 7000
      TZ: ${TZ:-Asia/Shanghai}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
